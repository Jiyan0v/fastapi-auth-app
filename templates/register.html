<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayıt Ol</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #6c63ff;
    --text: #e8e9f0;
    --muted: #7a7d8e;
    --error: #ff6b6b;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 2rem;
  }

  h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.4rem; }
  .subtitle { font-size: 0.9rem; color: var(--muted); margin-bottom: 2rem; }

  .alert-error {
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.875rem;
    margin-bottom: 1.25rem;
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    color: var(--error);
  }

  .field { margin-bottom: 1.25rem; }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus { border-color: var(--accent); }

  button[type="submit"] {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
  }

  button[type="submit"]:hover { opacity: 0.88; }

  .footer-link {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.875rem;
    color: var(--muted);
  }

  .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">// auth_app</div>
  <h1>Hesap oluştur</h1>
  <p class="subtitle">Başlamak için birkaç saniye yeterli.</p>

  {% if error %}
  <div class="alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/register">
    <div class="field">
      <label>Kullanıcı Adı</label>
      <input type="text" name="username" placeholder="kullanici_adi" required autofocus>
    </div>
    <div class="field">
      <label>E-posta</label>
      <input type="email" name="email" placeholder="ornek@email.com" required>
    </div>
    <div class="field">
      <label>Şifre</label>
      <input type="password" name="password" placeholder="En az 8 karakter" minlength="8" required>
    </div>
    <button type="submit">Kayıt Ol</button>
  </form>

  <div class="footer-link">
    Zaten hesabın var mı? <a href="/login">Giriş yap</a>
  </div>
</div>
</body>
</html>
